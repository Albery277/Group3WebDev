<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <!-- linked font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- linked swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <link rel="stylesheet" href="marketplace.css">

    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
    (function(){
        emailjs.init({
            publicKey: "pP7Oyn0x-FsE_luQV",
        });
    })();
    </script>


</head>
<body class="showCart">

    <!-- navbar section -->
    <header>
        <nav class="navbar section-content">
            <a href="Marketplace.html" class="nav-logo">
            <h2 class="logo-text">Marketplace</h2>
            </a>
            <ul class="nav-menu">

                <p class="nav-tool">
                    <a href="#" class="nav-tool-link">
                        <i class="fa-solid fa-heart"></i>
                        <span>0</span>
                    </a>
                    <a class="nav-tool-link">
                        <button id ='openCart' class="fa-solid fa-cart-shopping"></button>
                        <span id="cartTotal">0</span>
                    </a>

                <li class="nav-item">
                    <a href="index.html" class="nav-link">Go Back</a>
                </li>
            </ul>

        </nav>
    </header>

    <main>
        <!-- Menu Section -->
        <section class="menu-section" id="menu">
            <h2 class="section-title">Our Menu</h2>

            <div class="section-content">
                <!--check this uli maya-->
                <ul class="menu-list">
                    <div class="menu-item">
                        <img src="KiaFlowerv1.webp" alt="">
                        <h3 class="name">Name</h3>
                        <div class="price">Price</div>
      
                        <button class="fa fa-heart"></button>
                        <button class="addCart">Add to Cart</button>
                    </div>
                </ul>
            </div>

            <div class="cartTab">
                <h1>Shopping Cart</h1>
                <div class="listCart">
                    <div class="item">
                        <div class="image">
                            <img src="KiaFlowerv1.webp" alt="">
                        </div>
                        <div class="name">Pink Tulips</div>
                        <div class="totalPrice">Php 200</div>
                        <div class="quantity">
                            <span class="minus"><</span>
                            <span>1</span>
                            <span class="plus">></span>
                        </div>
                    </div>

                </div>
                <div class="btn">
                    <button class="close">CLOSE</button>
                    <button class="checkOut" onclick="Checkout()">CHECK OUT</button>
                </div>
            </div>

        </section>
    </main>


<!-- linked custom script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/scrollReveal.js/4.0.9/scrollreveal.min.js"></script>
<script src="Marketplace.js"></script>

</body>

</html>
