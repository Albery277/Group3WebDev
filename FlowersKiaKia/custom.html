    <main>
        <h2 class="section-title">Build your own bonquet</h2>
        
  <div class="container center">
     <h2 class="title_size">Bouquet Size:</h2>

    
    
    <div class="Bonquet_size">
      <input type="radio" name="size" id="size1" value="Standard">
      <label for="size1">
        <h4>Standard</h4>
        <p>4-5 business days</p>
        <div class="price">P100</div>
      </label>
    
      <input type="radio" name="size" id="size2" value="Deluxe">
      <label for="size2">
        <h4>Deluxe</h4>
        <p>4-5 business days</p>
        <div class="price">P100</div>
      </label>

      <input type="radio" name="size" id="size3" value="Supreme">
       <label for="size3">
        <h4>Supreme</h4>
        <p>4-5 business days</p>
        <div class="price">P100</div>
      </label>
    </div>
  </div>

   
  
  <div class="container center">
      <h2 class="title_size">Flowers</h2>
    
    <div class="Bonquet_flowers">
      <input type="checkbox" name="ftypes" id="checkbox1" value="Tulips">
      <label for="checkbox1">
        <h4> Pink Tulips</h4>
        <img src="KiaFlowerv1.webp" class="flower_image">
        <p>4-5 business days</p>
        <div class="price">P100</div>
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>
    
      <input type="checkbox" name="ftypes" id="checkbox2" value="Roses">

      label for="checkbox2">
        <h4>White Tulip</h4>
        <img src="KiaFlowerv3.webp" class="flower_image">
        <p>4-5 business days</p>
        <div class="price">P100</div>

        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>

      <input type="checkbox" name="ftypes" id="checkbox3" value="Sunflower">
       <label for="checkbox3">
        <h4>Sunflower</h4>
        <img src="KiaFlowerv4.webp" class="flower_image">
        <p>4-5 business days</p>
        <div class="price">P100</div>

        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>

      <input type="checkbox" name="ftypes" id="checkbox4" value="Daisies">
       <label for="checkbox4">
        <h4>Sunflower</h4>
        <img src="KiaFlowerv4.webp" class="flower_image">
        <p>4-5 business days</p>
        <div class="price">P100</div>

        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>


       <input type="checkbox" name="ftypes" id="checkbox5" value="Red Roses">
       <label for="checkbox5">
        <h4>Sunflower</h4>
        <img src="KiaFlowerv4.webp" class="flower_image">
        <p>4-5 business days</p>
        <div class="price">P100</div>
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>
  

      <input type="checkbox" name="ftypes" id="checkbox6" value="Lavender">

          <button type="button" class="increment">+</button>
        </div>
      </label>
