<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize your bonquet</title>
    <!-- linked font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- linked swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <link rel="stylesheet" href="custom.css">
    <script src="custom.js"></script>
</head>
<body>

    <header>
        <nav class="navbar section-content">
            <a href="Marketplace.html" class="nav-logo">
            <h2 class="logo-text">Customize</h2>
            </a>
            <ul class="nav-menu">

                <p class="nav-tool">
                    <a href="#" class="nav-tool-link"><i class="fa-solid fa-magnifying-glass"></i></a>
                    <a href="#" class="nav-tool-link"><i class="fa-solid fa-heart"></i></a>
                    <a href="#" class="nav-tool-link"><i class="fa-solid fa-cart-shopping"></i></a>

                <li class="nav-item">
                    <a href="index.html" class="nav-link">Go Back</a>
                </li>
            </ul>

        </nav>
    </header>

    <main>
        <h2 class="section-title">Build your own bonquet</h2>
        
<!--size ng boquet section-->
  <div class="container center">
     <h2 class="title_size">Bouquet Size:</h2>
    <div class="Bonquet_size">
      <input type="radio" name="size" id="size1" value="Standard">
      <label for="size1">
        <h4>Petite</h4>
        <p>10 inches</p>
        <div class="price">₱250</div>
      </label>
    
      <input type="radio" name="size" id="size2" value="Deluxe">
      <label for="size2">
        <h4>Signature</h4>
        <p>12 inches</p>
        <div class="price">₱350</div>
      </label>

      <input type="radio" name="size" id="size3" value="Supreme">
       <label for="size3">
        <h4>Grand</h4>
        <p>16 inches</p>
        <div class="price">₱1000</div>
      </label>
    </div>
  </div>

  <!-- wrap section-->

  <div class="container center">
     <h2 class="title_size">Ribbons:</h2>
     <div class="Bonquet_wrap">
      <input type="radio" name="wrap" id="radi1" value="Kraft">
      <label for="radi1">
        <h4> Metallica </h4>
        <img src="IMG_3524_1024x1024.webp" class="flower_image">
      </label>
    
      <input type="radio" name="wrap" id="radi2" value="Burlap">
      <label for="radi2">
        <h4>Organza</h4>
        <img src="Cream_Sheer_Organza_Fabric_by_Yard_Light_Beige_OrganzaLightweight_and_Soft_FabricOrganza_Fabric_for_Wedding_Gowns_Veil_Apparel_Backdrop.webp" class="flower_image">
      
      </label>

      <input type="radio" name="wrap" id="rad3" value="Cotton">
       <label for="rad3">
        <h4>Cotton </h4>
        <img src="images_24.webp" class="flower_image">
      
      </label>
    </div>


   <!-- Flower section-->
  
  <div class="container center">
      <h2 class="title_size">Flowers</h2>
    
    <div class="Bonquet_flowers">
      <input type="checkbox" name="ftypes" id="checkbox1" value="Tulips">
      <label for="checkbox1">
        <h4> Pink Tulips</h4>
        <img src="KiaFlowerv1.webp" class="flower_image">
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>
    
      <input type="checkbox" name="ftypes" id="checkbox2" value="Lavender">
      <label for="checkbox2">
        <h4>Lavender</h4>
        <img src="KiaFlowerv7.webp" class="flower_image">
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>

      <input type="checkbox" name="ftypes" id="checkbox3" value="lilies">
       <label for="checkbox3">
        <h4>Pink Easter Lily</h4>
        <img src="KiaFlowerv8.webp" class="flower_image">
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>

      <input type="checkbox" name="ftypes" id="checkbox4" value="Daisies">
       <label for="checkbox4">
        <h4>Gypsophila</h4>
        <img src="KiaFlowerv10.webp" class="flower_image">

        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>
      
       <input type="checkbox" name="ftypes" id="checkbox5" value="Red Roses">
       <label for="checkbox5">
        <h4>Sunflower</h4>
        <img src="1000013029-removebg-preview.webp" class="flower_image">
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>
  
      <input type="checkbox" name="ftypes" id="checkbox6" value="Red_Roses">
       <label for="checkbox6">
        <h4>Red Rose </h4>
        <img src="KiaFlowerv2.webp" class="flower_image">
        <div class="quantity">
          <button type="button" class="decrement">-</button>
          <span class="quantity_value">1</span>
          <button type="button" class="increment">+</button>
        </div>
      </label>
    </div>
  </div>

  <!-- wrap section uwu-->

  <div class="container center">
     <h2 class="title_size">Wrap:</h2>
     <div class="Bonquet_ribbons">
      <input type="radio" name="size" id="rad1" value="Metallic">
      <label for="rad1">
        <h4>Kraft</h4>
        <img src="images_25.webp" class="flower_image">
      </label>
    
      <input type="radio" name="size" id="rad2" value="Organza">
      <label for="rad2">
        <h4>Burlap</h4>
        <img src="natural-olive-safavieh-area-rugs-nf114g-6rw-64_1000.webp" class="flower_image">
      </label>

     <input type="radio" name="size" id="rad3" value="Cotton">
     <label for="rad3">
        <h4>Mesh</h4>
        <img src="3m-tm-hookit-tm-disc-255p.webp" class="flower_image">
    </label> 

    </div>
    <h2 class="title_size">Greeting Card</h2>
    <textarea rows= "10" cols="40" placeholder="Enter your message (optional)"></textarea>
  </div>

  <footer class="total-footer">
  <div class="footer-content">
    <span>Total: ₱ <span id="total">0</span>
    <button class="checkout">CheckOut!</button>
  </div>
  </footer>
  </section>
</main>

 <!-- linked for js script -->
<script src="custom.js"></script>
